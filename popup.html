<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 16px;
      background-color: #f9fafb;
      color: #1f2937;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .header h2 {
      margin: 0;
      font-size: 16px;
      color: #4f46e5;
    }
    textarea {
      width: 100%;
      height: 80px;
      box-sizing: border-box;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 8px;
      font-size: 13px;
      resize: none;
      outline: none;
    }
    textarea:focus {
      border-color: #4f46e5;
    }
    button {
      width: 100%;
      margin-top: 10px;
      background-color: #4f46e5;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background-color: #4338ca;
    }
    .result-box {
      margin-top: 12px;
      padding: 10px;
      background-color: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <span>✨</span>
    <h2>JargonBuster</h2>
  </div>
  
  <textarea id="inputText" placeholder="Paste any complex jargon or legal text here..."></textarea>
  <button id="simplifyBtn">Simplify Text</button>

  <div id="resultBox" class="result-box"></div>

  <script src="popup.js"></script>
</body>
</html>
